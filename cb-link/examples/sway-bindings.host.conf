# cb-link host keybind examples (for ~/.config/sway/config)
# Source this file from your sway config:
#   include ~/Tools/cb-link/examples/sway-bindings.host.conf
#
# These are examples; adjust modifiers/paths if they conflict with your setup.

# Mirror / extend / stop controls
bindsym $mod+p exec $HOME/Tools/cb-link/cb-display.sh mirror
bindsym $mod+Shift+p exec $HOME/Tools/cb-link/cb-display.sh extend
bindsym $mod+Ctrl+p exec $HOME/Tools/cb-link/cb-display.sh stop
bindsym $mod+Alt+p exec $HOME/Tools/cb-link/cb-display.sh toggle

# Optional helper if you use a rotate script
# bindsym $mod+o exec $HOME/.config/sway/scripts/sway-rotate-cycle.sh
